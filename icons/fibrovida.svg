<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8ab060"/>
      <stop offset="100%" stop-color="#4a7020"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#d4f0b0" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Círculo decorativo sutil -->
  <circle cx="256" cy="230" r="195" fill="rgba(255,255,255,0.07)"/>

  <!-- Folha -->
  <path d="M256 90
    C200 130, 140 200, 155 295
    C165 350, 210 385, 256 400
    C302 385, 347 350, 357 295
    C372 200, 312 130, 256 90Z"
    fill="url(#leaf)"/>

  <!-- Caule -->
  <line x1="256" y1="400" x2="256" y2="455"
    stroke="rgba(255,255,255,0.85)" stroke-width="18" stroke-linecap="round"/>

  <!-- Nervura central -->
  <line x1="256" y1="140" x2="256" y2="385"
    stroke="#6a9a40" stroke-width="7" stroke-linecap="round" opacity="0.6"/>

  <!-- Nervuras laterais -->
  <line x1="256" y1="210" x2="215" y2="255" stroke="#6a9a40" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="256" y1="255" x2="297" y2="300" stroke="#6a9a40" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="256" y1="300" x2="220" y2="340" stroke="#6a9a40" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
</svg>
